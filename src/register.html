<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
</head>
<body>
    <main id="register">
        <div class="container-fluid bg-primary min-vh-100 d-flex align-items-center">
            <div class="container bg-white p-4 rounded shadow overflow-hidden">
                <div class="row g-0" style="min-height: 100%">
                    <!-- Kolom kiri: About -->
                    <div class="col-md-5 d-flex flex-column justify-content-center align-items-center text-white bg-primary p-4 rounded-start">
                        <h2 class="text-start mb-4">
                            Need webdesign <br />
                            for your business? <br />
                            <span class="fw-bold">Design Spacee</span> will help you.
                        </h2>
                        <div class="text-end">
                            <img src="assets\img\login-img.png" alt="Banner" class="img-fluid mb-4" style="max-height: 250px; margin-left: 150px;" />
                        </div>
                    </div>
                
                <!-- Kolom kanan: Form Login -->
                    <div class="col-md-6 mx-auto m-5">
                        <div class="container-fluid">
                            <section class="login-page">
                                <h2 class="mb-4">Sign-in</h2>
                                <form class="row g-3">
                                    <div class="col-md-6">
                                        <label for="inputEmail4" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="inputEmail4" placeholder="email.com">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="inputPassword4" class="form-label">Password</label>
                                        <input type="password" class="form-control" id="inputPassword4" placeholder="12345678">
                                    </div>
                                    <div class="col-12">
                                        <label for="inputAddress" class="form-label">Address</label>
                                        <input type="text" class="form-control" id="inputAddress" placeholder="1234 Main St">
                                    </div>
                                    <div class="col-12">
                                        <label for="inputAddress2" class="form-label">Address 2</label>
                                        <input type="text" class="form-control" id="inputAddress2" placeholder="Apartment, studio, or floor">
                                    </div>
                                    <div class="col-md-6">
                                        <label for="inputCity" class="form-label">City</label>
                                        <input type="text" class="form-control" id="inputCity" placeholder="sansiro">
                                    </div>
                                    <div class="col-md-4">
                                        <label for="inputState" class="form-label">State</label>
                                    <select id="inputState" class="form-select" placeholder="italy">
                                        <option selected>Choose...</option>
                                        <option>...</option>
                                    </select>
                                    </div>
                                    <div class="col-md-2">
                                        <label for="inputZip" class="form-label">Zip</label>
                                        <input type="text" class="form-control" id="inputZip" placeholder="34343">
                                    </div>
                                    <div class="col-12">
                                        <div class="form-check">
                                            <input class="form-check-input" type="checkbox" id="gridCheck">
                                            <label class="form-check-label" for="gridCheck">
                                            Check me out
                                            </label>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <button type="submit" class="btn btn-primary w-100">Login</button>
                                    </div>
                                </form>
                                <p class="text-center m-3">
                                    Don't have an account?
                                    <a href="#" class="text-primary ">Log-in Here</a>
                                </p>
                            </section>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
</body>
</html>
